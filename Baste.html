<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضعیت سرویس</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --dark-blue: #003d80;
            --light-bg: #f4f7f9;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border-top: 5px solid var(--primary-blue);
        }

        h1 {
            color: var(--dark-blue);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #999;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>سایت به دلیل اعتراض شما در حال حاضر در دسترس نیست</h1>
        <p>لطفاً بعداً دوباره تلاش نمایید.</p>
        <div class="footer-note">بودجه وزارت ارتباطات ۱۰.۲۱ قطع شد انقدر اعتراض کردید:(</div>
    </div>

</body>
</html>
